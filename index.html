<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>T2 EFOF Submission Checker v23</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #f5f5f7; --card: #fff; --line: #e1e1e1; --text: #1d1d1f; --ok: #28a745; --bad: #d93025; --blue: #0066cc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #333; margin: 20px; font-size: 13px; }
        .container { max-width: 1550px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .uploadBox { border: 2px dashed #bbb; padding: 25px; text-align: center; cursor: pointer; border-radius: 10px; background: #fff; display: block; transition: 0.2s; }
        .uploadBox:hover { border-color: var(--blue); background: #f0f7ff; }
        input[type=file] { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid var(--line); position: sticky; top: 0; z-index: 10; font-size: 11px; text-transform: uppercase; color: #666; }
        td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; word-wrap: break-word; }
        .pill { padding: 4px 10px; border-radius: 20px; font-weight: bold; color: white; font-size: 10px; }
        .bg-ok { background: var(--ok); }
        .bg-bad { background: var(--bad); }
        .remark-updated { color: var(--ok); font-weight: bold; }
        .remark-pending { color: #888; font-style: italic; }
        .ok-text { color: var(--ok); font-weight: bold; }
        .fail-text { color: var(--bad); font-weight: bold; }
        .diag-row { background: #fdfdfd; border: 1px solid #eee; padding: 8px; border-radius: 6px; margin-bottom: 6px; font-family: 'Courier New', monospace; font-size: 11px; }
        .match-card { background: #f0fdf4; border-left: 5px solid var(--ok); padding: 12px; border-radius: 4px; }
        .btn-action { padding: 11px 20px; border-radius: 7px; cursor: pointer; font-weight: bold; border: none; margin-left: 10px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-copy { background: #28a745; color: white; }
        .btn-toggle { background: #6c757d; color: white; }
        .btn-toggle.active { background: #111; }
        .chk-col { width: 30px; text-align: center; }
        #datePicker { padding: 9px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; font-family: inherit; }
    </style>
</head>
<body>

<div class="container">
    <h2>T2 EFOF Submission Checker (v23)</h2>
    <p style="color:#666">Fixed logic: Tabs without a year are treated as <b>2025</b>[cite: 1].</p>
    
    <div class="grid">
        <label class="uploadBox"><input type="file" id="pbsuFile"><div id="pbsuLabel">📁 1. PBSU Schedule</div></label>
        <label class="uploadBox"><input type="file" id="casFile"><div id="casLabel">📄 2. CAS Export</div></label>
    </div>
    
    <div id="ui" style="display:none; text-align:center; padding: 20px; background: #f9f9f9; border-radius: 10px; margin-bottom: 20px;">
        <label style="font-weight:bold; margin-right: 10px;">Select Flight Date:</label>
        <input type="date" id="datePicker">
        
        <button onclick="runCheck()" class="btn-action btn-blue">Check Status</button>
        <button id="toggleHideUpdated" class="btn-action btn-toggle" onclick="toggleUpdatedFilter()">Hide Updated Remarks</button>
        <button onclick="copyTicked()" class="btn-action btn-copy">📋 Copy Ticked Data</button>
    </div>
    
    <div id="statsBar" style="display:none; margin: 15px 0; font-weight: bold; color: var(--blue);"></div>

    <table id="resTable" style="display:none;">
        <thead>
            <tr>
                <th class="chk-col"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                <th style="width: 40px;">#</th>
                <th style="width: 100px;">Submission</th>
                <th style="width: 90px;">Remark (F)</th>
                <th style="width: 100px;">Flight Date</th>
                <th style="width: 70px;">STD</th>
                <th style="width: 80px;">Flight</th>
                <th style="width: 80px;">Gate</th>
                <th style="width: 180px;">Team Leader (TL)</th>
                <th>Diagnostic Result</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script>
    var pbsuWb = null, casData = [];
    var hideUpdated = false;
    var sheetDateMap = {};

    function clean(s) { return (s || "").toString().toUpperCase().replace(/[^A-Z0-9]/g, '').trim(); }
    
    function cleanTL(s) {
        return (s || "").toString().toUpperCase()
            .replace(/\(.*?\)/g, '').replace(/\[.*?\]/g, '')
            .replace(/\b(PM|T2|AHD|CG|TEAM|ROV|PB|FO|XRAY|STAFF|OFFICER)\b/g, '')
            .replace(/[^A-Z]/g, ' ').trim();
    }

    // FIXED YEAR LOGIC[cite: 1]
    function parseSheetDate(name) {
        var cleanName = name.replace(/(st|nd|rd|th)/gi, '').trim();
        var hasYear = /\d{2}$|\d{4}$/.test(cleanName);
        var d = new Date(cleanName);
        if (isNaN(d.getTime())) return null;

        // If no year found in the name, force it to 2025[cite: 1]
        if (!hasYear) {
            d.setFullYear(2025);
        }
        return d;
    }

    function toDateStr(val) {
        if (!val) return "";
        var d = null;
        if (val instanceof Date) d = val;
        else if (typeof val === 'number') d = new Date((val - 25569) * 86400 * 1000);
        else {
            var s = val.toString().trim();
            var parts = s.split(/[\/\-\. ]/);
            if (parts.length >= 3) {
                if (parts[0].length === 4) d = new Date(parts[0], parts[1]-1, parts[2]);
                else d = new Date(parts[2], parts[1]-1, parts[0]);
            } else d = new Date(s);
        }
        if (!d || isNaN(d.getTime())) return "";
        return String(d.getDate()).padStart(2, '0') + "/" + String(d.getMonth() + 1).padStart(2, '0') + "/" + d.getFullYear();
    }

    function toggleSelectAll(master) {
        var checkboxes = document.getElementsByClassName('row-checkbox');
        for (var i = 0; i < checkboxes.length; i++) checkboxes[i].checked = master.checked;
    }

    function copyTicked() {
        var selectedDate = document.getElementById('datePicker').value;
        var displayDate = toDateStr(new Date(selectedDate));
        var checkboxes = document.getElementsByClassName('row-checkbox');
        var lines = ["Date: " + displayDate];
        var count = 0;

        for (var i = 0; i < checkboxes.length; i++) {
            if (checkboxes[i].checked) {
                var std = checkboxes[i].getAttribute('data-std').replace(/[^0-9]/g, '').substring(0,4).padStart(4, '0');
                var flight = checkboxes[i].getAttribute('data-flight');
                var gate = checkboxes[i].getAttribute('data-gate');
                var tl = checkboxes[i].getAttribute('data-tl');
                lines.push(std + " " + flight + " " + gate + " " + tl);
                count++;
            }
        }
        if (count === 0) { alert("No rows ticked!"); return; }
        navigator.clipboard.writeText(lines.join('\n')).then(function() { alert("Copied " + count + " rows!"); });
    }

    function toggleUpdatedFilter() {
        hideUpdated = !hideUpdated;
        var btn = document.getElementById('toggleHideUpdated');
        btn.innerText = hideUpdated ? "Showing: Pending Only" : "Hide Updated Remarks";
        btn.classList.toggle('active', hideUpdated);
        if (pbsuWb) runCheck();
    }

    document.getElementById('pbsuFile').onchange = function(e) {
        var file = e.target.files[0]; document.getElementById('pbsuLabel').innerText = file.name;
        var reader = new FileReader();
        reader.onload = function(evt) {
            pbsuWb = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
            sheetDateMap = {};
            var dates = [];
            pbsuWb.SheetNames.forEach(function(n) {
                var d = parseSheetDate(n);
                if (d) {
                    var offsetDate = new Date(d.getTime() - (d.getTimezoneOffset() * 60000));
                    var iso = offsetDate.toISOString().split('T')[0];
                    sheetDateMap[iso] = n;
                    dates.push(d);
                }
            });
            if (dates.length > 0) {
                dates.sort(function(a,b){ return b-a; }); 
                var latest = new Date(dates[0].getTime() - (dates[0].getTimezoneOffset() * 60000));
                document.getElementById('datePicker').value = latest.toISOString().split('T')[0];
                document.getElementById('ui').style.display = 'block';
            } else { alert("No valid date tabs found in PBSU file!"); }
        };
        reader.readAsBinaryString(file);
    };

    document.getElementById('casFile').onchange = function(e) {
        var file = e.target.files[0]; document.getElementById('casLabel').innerText = file.name;
        var reader = new FileReader();
        reader.onload = function(evt) {
            var wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
            casData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: "A", defval: "" });
        };
        reader.readAsBinaryString(file);
    };

    function runCheck() {
        var isoDate = document.getElementById('datePicker').value;
        var sheetName = sheetDateMap[isoDate];
        if (!sheetName) { alert("No exact tab found for this date!"); return; }

        var rows = XLSX.utils.sheet_to_json(pbsuWb.Sheets[sheetName], { header: "A", range: 4, defval: "" });
        var baseDate = new Date(isoDate);
        var tbody = document.getElementById('resultsBody'); tbody.innerHTML = '';
        var lastStd = -1, dayOff = 0, stats = { total: 0, hidden: 0 };

        rows.forEach(function(r, i) {
            var pFlight = clean(r['C']), pGate = clean(r['D']), pTL = r['E'] ? r['E'].toString().trim() : "";
            var pStdRaw = r['B'] ? r['B'].toString().trim().split('\n')[0] : "";
            var pColF = r['F'];
            if (!pFlight || !pStdRaw) return;

            var isUpdated = (pColF === true || pColF === 1 || pColF === "TRUE");
            if (hideUpdated && isUpdated) { stats.hidden++; return; }

            var curNum = parseInt(pStdRaw.replace(/[^0-9]/g, '').substring(0,4));
            if (lastStd > 2000 && curNum < 500) dayOff++;
            lastStd = curNum;

            var fDate = new Date(baseDate); fDate.setDate(fDate.getDate() + dayOff);
            var fDateStr = toDateStr(fDate);
            var win = [fDateStr, toDateStr(new Date(fDate.getTime() + 86400000)), toDateStr(new Date(fDate.getTime() + 172800000))];

            var bestMatch = null, diagHtml = "";
            var candidates = casData.filter(function(c) { return clean(c['L']) === pFlight; });

            if (candidates.length > 0) {
                diagHtml = "<b>" + candidates.length + " found:</b>";
                for (var j = 0; j < candidates.length; j++) {
                    var m = candidates[j];
                    var cDate = toDateStr(m['K']);
                    var isDate = (win.indexOf(cDate) !== -1);
                    var pNames = cleanTL(pTL).split(' ').filter(function(x){return x.length > 2;});
                    var cSearch = ((m['C']||"") + " " + (m['J']||"")).toUpperCase();
                    var isTL = pNames.some(function(n){ return cSearch.indexOf(n) !== -1; });
                    var isGate = (clean(m['O']).indexOf(pGate.substring(0,3)) !== -1 || pGate.indexOf(clean(m['O']).substring(0,3)) !== -1);
                    
                    diagHtml += "<div class='diag-row'>Row " + m['A'] + ": Date " + (isDate?'<b style="color:green">OK</b>':'<b style="color:red">FAIL</b>') + " ("+(cDate||"??")+") | TL " + (isTL?'<b style="color:green">OK</b>':'<b style="color:red">FAIL</b>') + " ("+(m['C']||"??")+") | Gate " + (isGate?'<b style="color:green">OK</b>':'<b style="color:red">FAIL</b>') + " ("+(m['O']||"??")+")</div>";
                    if (isDate && isTL) { bestMatch = m; break; }
                }
            } else { diagHtml = "<i>No flight match.</i>"; }

            var tr = document.createElement('tr');
            tr.style.backgroundColor = bestMatch ? '#effaf2' : '#fff9f9';
            tr.innerHTML = '<td class="chk-col"><input type="checkbox" class="row-checkbox" data-std="'+pStdRaw+'" data-flight="'+r['C']+'" data-gate="'+r['D']+'" data-tl="'+pTL+'"></td>' +
                '<td>' + (i+1) + '</td>' +
                '<td><span class="pill ' + (bestMatch ? 'bg-ok' : 'bg-bad') + '">' + (bestMatch ? '✅ SUBMITTED' : '❌ MISSING') + '</span></td>' +
                '<td><span class="' + (isUpdated?'remark-updated':'remark-pending') + '">' + (isUpdated?'Updated':'Pending') + '</span></td>' +
                '<td>' + fDateStr + '</td><td>' + pStdRaw + '</td><td><b>' + r['C'] + '</b></td><td>' + r['D'] + '</td><td>' + pTL + '</td>' +
                '<td>' + (bestMatch ? '<div class="match-card"><b>VERIFIED</b>: ' + bestMatch['C'] + ' (Row ' + bestMatch['A'] + ')</div>' : diagHtml) + '</td>';
            tbody.appendChild(tr);
            stats.total++;
        });
        document.getElementById('resTable').style.display = 'table';
        document.getElementById('statsBar').style.display = 'block';
        document.getElementById('statsBar').innerText = "Showing " + stats.total + " flights" + (stats.hidden > 0 ? " (" + stats.hidden + " Updated hidden)" : "");
    }
</script>
</body>
</html>
